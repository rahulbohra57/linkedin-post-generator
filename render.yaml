services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: linkedin-post-generator-api
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/linkedin_posts.db
      - key: LOCAL_STORAGE_PATH
        value: ./storage/images
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://linkedin-post-generator-jztf.onrender.com,https://linkedin-post-generator-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      # ── API keys — fill these in the Render dashboard ──────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────
  - type: web
    name: linkedin-post-generator-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    buildArgs:
      - key: NEXT_PUBLIC_WS_URL
        value: wss://linkedin-post-generator-api.onrender.com
      - key: BACKEND_URL
        value: https://linkedin-post-generator-api.onrender.com
    envVars:
      - key: BACKEND_URL
        value: https://linkedin-post-generator-api.onrender.com
      - key: NODE_ENV
        value: production
